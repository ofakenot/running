<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRX Running — Convite Oficial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Inter:wght@300&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4d4d;
            --secondary: #f97316;
            --bg: #030303;
            --card-bg: rgba(15, 15, 15, 0.85);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Ambient Background */
        .orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.12;
            animation: move 25s infinite alternate ease-in-out;
        }
        .orb-1 { background: var(--primary); top: -20%; left: -10%; }
        .orb-2 { background: var(--secondary); bottom: -20%; right: -10%; animation-delay: -7s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(80px, 40px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 540px;
            padding: 24px;
            perspective: 1200px;
        }

        /* Card Layout */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border);
            border-radius: 44px;
            padding: 50px 35px;
            text-align: center;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: cardEnter 0.9s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(50px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        /* Logo Styling */
        .logo-wrapper {
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
        }
        .logo-wrapper svg {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 77, 77, 0.2));
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.2);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .title {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(28px, 7vw, 40px);
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .title span { font-style: italic; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .description {
            color: var(--text-dim);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 45px;
        }
        .stat-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 18px 5px;
            border-radius: 24px;
            transition: 0.3s;
        }
        .stat-box:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }
        .stat-box h4 { font-family: 'Unbounded', sans-serif; font-size: 18px; color: #fff; margin-bottom: 2px; }
        .stat-box p { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 700; }

        /* Button */
        .cta-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--gradient);
            color: #fff;
            text-decoration: none;
            padding: 24px;
            border-radius: 22px;
            font-family: 'Unbounded', sans-serif;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(255, 77, 77, 0.3);
            margin-bottom: 45px;
        }
        .cta-btn:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 50px rgba(255, 77, 77, 0.5);
        }

        /* Footer Navigation */
        .footer-nav {
            border-top: 1px solid var(--border);
            padding-top: 35px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .nav-links-row {
            display: flex;
            gap: 12px;
        }
        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 18px;
            text-decoration: none;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s ease;
        }
        .nav-item svg { width: 18px; height: 18px; stroke: var(--secondary); }
        .nav-item:hover { background: rgba(255,255,255,0.08); border-color: var(--secondary); }

        .copyright {
            font-size: 10px;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .main-card { padding: 40px 24px; }
            .stats-grid { grid-template-columns: 1fr; }
            .nav-links-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <main class="main-card" id="tilt-card">
            
            <div class="logo-wrapper">
                <svg width="320" height="35" viewBox="0 0 290 58" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="gH" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#ff4d4d"/>
                            <stop offset="100%" style="stop-color:#f97316"/>
                        </linearGradient>
                    </defs>
                    <text x="0" y="42" font-family="'Verdana',sans-serif" font-weight="900" font-style="italic" font-size="34" fill="url(#gH)" letter-spacing="-1">BRX</text>
                    <text x="88" y="42" font-family="'Inter',sans-serif" font-weight="300" font-size="28" fill="#ffffff" letter-spacing="2">RUNNING</text>
                    <rect x="0" y="50" width="66" height="4" fill="url(#gH)" rx="2"/>
                </svg>
            </div>

            <div class="badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                Acesso Selecionado
            </div>

            <h1 class="title">Performance Sem <span>Fronteiras.</span></h1>
            
            <p class="description">
                Você foi escolhido para o coletivo BRX Running. Conecte-se com corredores de 8 países e eleve seu nível.
            </p>

            <div class="stats-grid">
                <div class="stat-box">
                    <h4>874</h4>
                    <p>Atletas</p>
                </div>
                <div class="stat-box">
                    <h4>08</h4>
                    <p>Países</p>
                </div>
                <div class="stat-box">
                    <h4>FREE</h4>
                    <p>Membros</p>
                </div>
            </div>

            <a href="https://chat.whatsapp.com/FPtzh45Yvp6AzKhHDskIoK" class="cta-btn">
                ENTRAR NA COMUNIDADE
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>

            <footer class="footer-nav">
                <div class="nav-links-row">
                    <a href="https://bropharmaceuticals.com/app" target="_blank" class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                        App 
                    </a>
                    <a href="https://instagram.com/brxrunning" target="_blank" class="nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                        @brxrunning
                    </a>
                </div>
                <p class="copyright">© 2026 BRX RUNNING COLLECTIVE</p>
            </footer>

        </main>
    </div>

    <script>
        // Efeito sutil de inclinação (Tilt) para Desktop
        const card = document.getElementById('tilt-card');
        document.body.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                let xAxis = (window.innerWidth / 2 - e.pageX) / 45;
                let yAxis = (window.innerHeight / 2 - e.pageY) / 45;
                card.style.transform = `rotateY(${-xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        document.body.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            card.style.transition = "all 0.6s ease";
        });

        document.body.addEventListener('mouseenter', () => {
            card.style.transition = "none";
        });
    </script>
</body>
</html>
